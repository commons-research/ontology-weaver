name: pr-mermaid-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-mermaid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download source TTLs
        run: |
          uv run python scripts/download_external_sources.py --all --force

      - name: Generate Mermaid review markdown
        run: |
          uv run python scripts/generate_pr_mermaid_review.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --output .github/pr-mermaid-review.md

      - name: Upload Mermaid review markdown
        uses: actions/upload-artifact@v4
        with:
          name: pr-mermaid-review
          path: .github/pr-mermaid-review.md

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-mermaid-review -->";
            const body = fs.readFileSync(".github/pr-mermaid-review.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && typeof comment.body === "string" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
