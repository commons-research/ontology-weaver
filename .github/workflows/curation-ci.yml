name: curation-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  curation-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: |
          uv run python -m py_compile \
            streamlit_app.py \
            curation_app/*.py \
            curation_app/pages/*.py \
            scripts/*.py

      - name: Validate shared ledgers
        run: |
          uv run python scripts/validate_pair_alignments.py registry/pair_alignment_candidates_emi.tsv --kind candidate
          uv run python scripts/validate_pair_alignments.py registry/pair_alignment_candidates_enpkg.tsv --kind candidate

      - name: Download source TTLs
        run: |
          uv run python scripts/download_external_sources.py --all --force
          mkdir -p .ci_exports/downloads
          cp registry/downloads/emi.ttl .ci_exports/downloads/emi.ttl
          cp registry/downloads/enpkg.ttl .ci_exports/downloads/enpkg.ttl

      - name: Generate and validate enriched TTL exports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci_exports/exports
          for source in emi enpkg; do
            uv run python scripts/export_updated_ttl.py \
              --ledger "registry/pair_alignment_candidates_${source}.tsv" \
              --source-ttl "registry/downloads/${source}.ttl" \
              --output ".ci_exports/exports/${source}_updated.ttl" \
              --mapping-output ".ci_exports/exports/${source}_mappings.ttl"
          done

      - name: Upload TTL export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ttl-exports
          path: .ci_exports

      - name: Smoke-test SQLite sync and reconciled exports
        shell: bash
        run: |
          set -euo pipefail

          for source in emi enpkg; do
            tmpdir="$(mktemp -d)"
            uv run python scripts/sync_alignment_sqlite.py \
              --db "${tmpdir}/${source}.sqlite" \
              --pair-candidates "registry/pair_alignment_candidates_${source}.tsv" \
              --pair-alignments "registry/pair_alignment_candidates_${source}.tsv" \
              --reconciled-output "${tmpdir}/${source}_reconciled.tsv" \
              --grouped-output "${tmpdir}/${source}_grouped.tsv"
          done
